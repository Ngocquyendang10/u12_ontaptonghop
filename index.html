<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Unit 12 [Điện thoại]</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa; 
            color: #333;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #f5f7fa;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 9px 9px 20px #d1d9e6, -9px -9px 20px #ffffff;
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 5px;
            font-size: 26px;
            text-shadow: 1px 1px 1px #ffffff;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 40px;
            font-size: 14px;
        }
        .dialogue-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .sentence-block {
            background: #f5f7fa;
            padding: 25px;
            border-radius: 20px;
            box-shadow: inset 3px 3px 8px #d1d9e6, inset -3px -3px 8px #ffffff;
        }
        .korean-line {
            font-size: 18px;
            line-height: 1.9;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            color: #000000;
        }
        .speaker-민수 {
            font-weight: bold;
            color: #88C1F2;
            background: #f5f7fa;
            padding: 4px 12px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            margin-right: 5px;
        }
        .speaker-수진 {
            font-weight: bold;
            color: #F5AEAD;
            background: #f5f7fa;
            padding: 4px 12px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            margin-right: 5px;
        }
        .play-btn {
            background: #f5f7fa;
            border: none;
            color: #4a5568;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-right: 10px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            transition: all 0.2s ease;
        }
        .play-btn:hover {
            color: #3182ce;
            box-shadow: 1px 1px 3px #d1d9e6, -1px -1px 3px #ffffff;
        }
        .play-btn:active {
            box-shadow: inset 2px 2px 4px #d1d9e6, inset -2px -2px 4px #ffffff;
        }
        input[type="text"].blank {
            border: none;
            background: #f5f7fa;
            padding: 4px 14px;
            font-size: 16px;
            color: #0C2337;
            text-align: center;
            border-radius: 20px;
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
            transition: all 0.3s ease;
            margin: 0 4px;
        }
        input[type="text"].blank:focus {
            outline: none;
            box-shadow: inset 1px 1px 2px #B3CEE5, inset -1px -1px 2px #ffffff;
        }
        input[type="text"].blank.correct {
            color: #38a169;
            box-shadow: inset 2px 2px 5px #c6f6d5, inset -2px -2px 5px #ffffff;
            background: #f0fff4;
        }
        input[type="text"].blank.wrong {
            color: #e53e3e;
            box-shadow: inset 2px 2px 5px #fed7d7, inset -2px -2px 5px #ffffff;
            background: #fff5f5;
        }
        .translation-zone {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .translation-box {
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: #f5f7fa;
            border-radius: 12px;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
            transition: all 0.3s ease;
        }
        .translation-box:focus {
            outline: none;
            box-shadow: inset 1px 1px 3px #4299e1, inset -1px -1px 3px #ffffff;
        }
        .hint-text {
            font-size: 14px;
            color: #2d3748;
            background: #edf2f7;
            padding: 12px 16px;
            border-radius: 10px;
            display: none; /* Ban đầu ẩn hoàn toàn */
            box-shadow: inset 1px 1px 3px #d1d9e6;
            line-height: 1.5;
        }
        .action-area {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .check-btn, .global-hint-btn {
            background: #f5f7fa;
            color: #4a5568;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
            transition: all 0.2s ease;
        }
        .check-btn:hover {
            color: #38a169;
            box-shadow: 2px 2px 6px #d1d9e6, -2px -2px 6px #ffffff;
        }
        .check-btn:active {
            box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff;
        }
        /* Style trạng thái khóa (Unavailable) của nút hiển thị dịch mẫu */
        .global-hint-btn {
            color: #a0aec0;
            cursor: not-allowed;
            opacity: 0.6;
        }
        /* Style trạng thái mở khóa (Available) màu xanh dương pastel hiện đại */
        .global-hint-btn.active {
            color: #ffffff;
            background: #88C1F2;
            cursor: pointer;
            opacity: 1;
            box-shadow: 5px 5px 10px #b8c2cc, -5px -5px 10px #ffffff;
        }
        .global-hint-btn.active:hover {
            background: #A0D3FF;
            box-shadow: 2px 2px 6px #b8c2cc, -2px -2px 6px #ffffff;
        }
        .global-hint-btn.active:active {
            box-shadow: inset 3px 3px 6px #1a365d, inset -3px -3px 6px #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hội thoại chủ đề "Điện thoại"</h1>
    <div class="subtitle">Ngoc Quyen's Classroom · THTH 1_Unit 12</div>
      <div class="subtitle">Đề bài: Hãy click vào icon "phát âm thanh" ở mỗi câu để nghe và điền vào chỗ trống. Sau đó hãy dịch câu văn sang tiếng Việt. 
      Sau khi điền và dịch xong, học viên có thể tự kiểm tra kết quả ở 2 nút phía cuối bài tập </div>

    <div class="dialogue-wrapper" id="dialogue"></div>

    <div class="action-area">
        <button class="check-btn" onclick="checkAnswers()">Kết quả điền từ</button>
        <button id="global-hint-button" class="global-hint-btn" disabled onclick="toggleAllHints()">Bản dịch tiếng Việt</button>
    </div>
</div>

<script>
const dialogueData = [
        { id: 1, text: "민수 씨는 이번 주 토요일에 [친구와 영화를 보려고 해요]. 그래서 오늘 오전 10시에 [수진 씨에게] 전화를 합니다.", speaker: "", hint: "Minsoo định đi xem phim với bạn vào thứ Bảy tuần này. Vì vậy, cậu ấy gọi điện cho Soojin vào lúc 10 giờ sáng hôm nay." },
        { id: 2, text: "여보세요? 거기 [수진 씨지요]?", speaker: "민수", hint: "A lô? Bên đó có phải là Soojin không ạ?" },
        { id: 3, text: "네, [그런데요]. 실례지만 [누구세요]?", speaker: "수진", hint: "Vâng, đúng rồi ạ. Xin lỗi, ai đầu dây đấy ạ?" },
        { id: 4, text: "저는 민수예요. 제가 오늘 생일 [선물을 받았어요]. 수진 씨가 선물을 [보냈어요]?", speaker: "민수", hint: "Tôi là Minsoo đây ạ. Hôm nay tôi đã nhận được quà sinh nhật. Soojin đã gửi quà cho tôi à?" },
        { id: 5, text: "오, 아니에요~ [제 선물이 아니에요]. 선물을 [안 보냈어요].", speaker: "수진", hint: "Ôi, không phải đâu ạ~ Không phải quà của tôi đâu. Tôi không có gửi quà ạ." },
        { id: 6, text: "오, 그래요? 아~ 오늘 학교에서 [영어를 배우지만] 안 바빠요. 점심에 [만날래요]? 저는 베트남 음식을 [먹고 싶어요].", speaker: "민수", hint: "Ôi, thế ạ? À~ Hôm nay ở trường tôi học tiếng Anh nhưng không bận lắm. Buổi trưa chúng ta gặp nhau nhé? Tôi muốn ăn món ăn Việt Nam." },
        { id: 7, text: "그래요? 저는 지금 [동생하고] 집에서 청소를 해요. [12시부터 2시까지] 시간이 있어요.", speaker: "수진", hint: "Vậy à? Bây giờ tôi đang dọn dẹp nhà cửa cùng với em. Tôi có thời gian từ 12 giờ đến 2 giờ." },
        { id: 8, text: "좋아요. 그럼 12시 30분에 [학교 앞으로] 오세요. [거기에서 만나고] 같이 점심을 먹어요. 그리고 같이 [영화를 볼래요]?", speaker: "민수", hint: "Được ạ. Vậy thì 12 giờ 30 phút bạn đến trước cổng trường nhé. Chúng ta gặp nhau ở đó rồi cùng ăn trưa. Và chúng ta cùng đi xem phim nhé?" },
        { id: 9, text: "좋아요. 하지만 오늘은 비가 오고 [바람도 불어요]. 조금 [추울 거예요].", speaker: "수진", hint: "Được ạ. Nhưng hôm nay trời mưa và gió cũng thổi nữa. Sẽ hơi lạnh đấy ạ." },
        { id: 10, text: "네. 저는 지난 주에 우산 [두 개를] 샀어요. [수진 씨에게] 우산을 줄 거예요. 그리고 [커피도 두 잔] 사 줄 거예요.", speaker: "민수", hint: "Vâng. Tuần trước tôi đã mua hai cái ô. Tôi sẽ đưa ô cho Su-jin. Và tôi cũng sẽ mua cho bạn hai ly cà phê nữa." },
        { id: 11, text: "감사합니다. 그럼 12시 30분에 [만납시다]. 문자메시지를 [보내 주세요].", speaker: "수진", hint: "Cảm ơn nhé. Vậy 12 giờ 30 phút chúng ta gặp nhau đi. Xin hãy gửi tin nhắn văn bản cho tôi." },
        { id: 12, text: "네, [메시지를 보내겠습니다].", speaker: "민수", hint: "Vâng, tôi sẽ gửi tin nhắn ạ." }
    ];

    let currentAudio = null;
    let hintsVisible = false;

    // Hàm phát audio local mượt mà trong Live Server
    function playAudio(id) {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }
        
        // Gọi trực tiếp file từ thư mục audio nội bộ
        currentAudio = new Audio(`./audio/${id}.mp3`);
        currentAudio.play().catch(error => {
            alert(`Pen ơi, hình như thiếu file "${id}.mp3" trong thư mục "audio" rồi, Pen check lại thử nha!`);
        });
    }

    function validateAllTranslations() {
        const boxes = document.querySelectorAll('.translation-box');
        const globalBtn = document.getElementById('global-hint-button');
        let allValid = true;

        boxes.forEach(box => {
            if (box.value.trim().length < 6) {
                allValid = false;
            }
        });

        if (allValid) {
            globalBtn.classList.add('active');
            globalBtn.disabled = false;
        } else {
            globalBtn.classList.remove('active');
            globalBtn.disabled = true;
            if (hintsVisible) {
                toggleAllHints();
            }
        }
    }

    function toggleAllHints() {
        const hintBlocks = document.querySelectorAll('.hint-text');
        const globalBtn = document.getElementById('global-hint-button');
        hintsVisible = !hintsVisible;

        hintBlocks.forEach(block => {
            block.style.display = hintsVisible ? 'block' : 'none';
        });

        globalBtn.innerText = hintsVisible ? "Ẩn bản dịch mẫu" : "Hiển thị bản dịch mẫu";
    }

    const dialogueContainer = document.getElementById('dialogue');
    
    dialogueData.forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'sentence-block';

        let rawText = item.text;
        const regex = /\[(.*?)\]/g;
        let match;
        let parts = [];
        let lastIndex = 0;

        while ((match = regex.exec(rawText)) !== null) {
            if (match.index > lastIndex) {
                parts.push(rawText.substring(lastIndex, match.index));
            }
            const answer = match[1];
            const width = Math.max(80, answer.length * 14 + 24); 
            parts.push(`<input type="text" class="blank" data-answer="${answer}" style="width: ${width}px;" placeholder="...">`);
            lastIndex = regex.lastIndex;
        }
        if (lastIndex < rawText.length) {
            parts.push(rawText.substring(lastIndex));
        }

        const formattedText = parts.join('');

        let speakerTag = '';
        if (item.speaker === '민수') {
            speakerTag = `<span class="speaker-민수">🙎🏻‍♂️ 민수</span>`;
        } else if (item.speaker === '수진') {
            speakerTag = `<span class="speaker-수진">🙎🏻‍♀️ 수진</span>`;
        }

        block.innerHTML = `
            <div class="korean-line">
                <button class="play-btn" onclick="playAudio(${item.id})">▶</button>
                ${speakerTag}
                <span>${formattedText}</span>
            </div>
            <div class="translation-zone">
                <textarea class="translation-box" rows="1" 
                          oninput="validateAllTranslations()" 
                          placeholder="Nhập bản dịch tiếng Việt của câu này vào đây..."></textarea>
                <div id="hint-text-${index}" class="hint-text">💡 <b>Bản dịch mẫu:</b> ${item.hint}</div>
            </div>
        `;
        dialogueContainer.appendChild(block);
    });

    function checkAnswers() {
        const blanks = document.querySelectorAll('.blank');
        blanks.forEach(input => {
            const userAnswer = input.value.trim().replace(/\s+/g, ' ');
            const correctAnswer = input.getAttribute('data-answer').trim().replace(/\s+/g, ' ');

            if (userAnswer === '') {
                input.className = 'blank';
            } else if (userAnswer === correctAnswer) {
                input.className = 'blank correct';
            } else {
                input.className = 'blank wrong';
            }
        });
    }
</script>

</body>
</html>
